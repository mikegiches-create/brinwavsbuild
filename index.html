    <!--
      Theme initialisation — runs before first paint to avoid a flash.
      Mirrors the logic in ThemeContext.tsx → applyTheme().

      Rules:
        'light' → add .light-theme   (explicit CSS variables)
        'dark'  → add .dark-theme    (explicit CSS variables)
        'os'    → no class           (CSS @media prefers-color-scheme takes over)
        default → 'light'
    -->
    <script>
      (function () {
        var theme = localStorage.getItem('theme') || 'light';
        var html  = document.documentElement;

        if (theme === 'os') {
          html.classList.remove('light-theme', 'dark-theme');
        } else if (theme === 'light') {
          html.classList.remove('dark-theme');
          html.classList.add('light-theme');
        } else {
          html.classList.remove('light-theme');
          html.classList.add('dark-theme');
        }
      })();
    </script>
